name: Deploy Bringora to Cloudways

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm deployment"
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - "cloudways/**"
      - ".github/workflows/deploy-cloudways.yml"

jobs:
  deploy:
    name: Deploy to Cloudways
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.confirm == 'DEPLOY'

    env:
      CLOUDWAYS_HOST: ${{ secrets.CLOUDWAYS_HOST }}
      CLOUDWAYS_USERNAME: ${{ secrets.CLOUDWAYS_USERNAME }}
      CLOUDWAYS_PORT: ${{ secrets.CLOUDWAYS_PORT }}
      CLOUDWAYS_SSH_KEY: ${{ secrets.CLOUDWAYS_SSH_KEY }}
      CLOUDWAYS_APP_PATH: ${{ secrets.CLOUDWAYS_APP_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDWAYS_HOST"
          test -n "$CLOUDWAYS_USERNAME"
          test -n "$CLOUDWAYS_PORT"
          test -n "$CLOUDWAYS_SSH_KEY"
          test -n "$CLOUDWAYS_APP_PATH"

      - name: Prepare SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$CLOUDWAYS_SSH_KEY" > ~/.ssh/cloudways_deploy_key
          chmod 600 ~/.ssh/cloudways_deploy_key
          ssh-keyscan -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target directories exist
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cloudways_deploy_key -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST" "mkdir -p '$CLOUDWAYS_APP_PATH/public_html' '$CLOUDWAYS_APP_PATH/private_html'"

      - name: Deploy public files
        shell: bash
        run: |
          set -euo pipefail
          rsync -rz --no-perms --no-owner --no-group --omit-dir-times \
            -e "ssh -i ~/.ssh/cloudways_deploy_key -p $CLOUDWAYS_PORT" \
            cloudways/public_html/ \
            "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST:$CLOUDWAYS_APP_PATH/public_html/"

      - name: Deploy private code files without overwriting server secrets
        shell: bash
        run: |
          set -euo pipefail
          rsync -rz --no-perms --no-owner --no-group --omit-dir-times \
            --exclude 'private_config.php' \
            -e "ssh -i ~/.ssh/cloudways_deploy_key -p $CLOUDWAYS_PORT" \
            cloudways/private_html/ \
            "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST:$CLOUDWAYS_APP_PATH/private_html/"

      - name: Verify health endpoint path exists on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cloudways_deploy_key -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST" "test -f '$CLOUDWAYS_APP_PATH/public_html/health.php'"

      - name: Verify deployed Bringora code markers
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cloudways_deploy_key -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST" "set -e; date; stat -c '%y %n' '$CLOUDWAYS_APP_PATH/public_html/index.php'; grep -n 'bringoraAccessToken' '$CLOUDWAYS_APP_PATH/public_html/index.php'; grep -n 'X-Bringora-Access' '$CLOUDWAYS_APP_PATH/public_html/index.php'; grep -n 'bringora_access_header_valid' '$CLOUDWAYS_APP_PATH/public_html/api.php'; grep -n 'BRINGORA_AUTH' '$CLOUDWAYS_APP_PATH/private_html/auth.php'"

      - name: Run server PHP syntax checks
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cloudways_deploy_key -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST" "set -e; php -v; php -l '$CLOUDWAYS_APP_PATH/public_html/index.php'; php -l '$CLOUDWAYS_APP_PATH/public_html/api.php'; php -l '$CLOUDWAYS_APP_PATH/public_html/save_output.php'; php -l '$CLOUDWAYS_APP_PATH/public_html/saved_outputs.php'; php -l '$CLOUDWAYS_APP_PATH/public_html/brain.php'; php -l '$CLOUDWAYS_APP_PATH/public_html/examples.php'; php -l '$CLOUDWAYS_APP_PATH/private_html/auth.php'; php -l '$CLOUDWAYS_APP_PATH/private_html/db.php'"

      - name: Run live API smoke test diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cloudways_deploy_key -p "$CLOUDWAYS_PORT" "$CLOUDWAYS_USERNAME@$CLOUDWAYS_HOST" bash -s -- "$CLOUDWAYS_APP_PATH" <<'REMOTE'
          set -euo pipefail
          APP_PATH="$1"
          TOKEN="$(php -r '$c=require $argv[1] . "/private_html/private_config.php"; echo hash_hmac("sha256", "bringora_beta_access", (string)$c["BETA_PASSWORD"]);' "$APP_PATH")"
          BODY="$(mktemp)"
          CODE="$(curl -sS -o "$BODY" -w '%{http_code}' -H 'Content-Type: application/json' -H "X-Bringora-Access: $TOKEN" --data '{"prompt":"Reply with only the word OK for deployment health check.","mode":"write"}' 'https://bringora.barndai.com/api.php')"
          echo "HTTP_CODE=$CODE"
          head -c 1200 "$BODY"
          echo
          test "$CODE" = "200"
          grep -q '"success":true' "$BODY"
          REMOTE
